<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunarift Files</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html,
        body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #020617;
            color: #cbd5e1;
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .row-item {
            transition: background 0.1s;
            cursor: default;
            user-select: none;
        }

        .row-item:hover {
            background: rgba(59, 130, 246, 0.08);
        }

        .row-selected {
            background: rgba(59, 130, 246, 0.18) !important;
        }

        .name-fade {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            mask-image: linear-gradient(to right, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border: 2px solid #020617;
            border-radius: 10px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }

        #mainScroll {
            height: calc(100vh - 57px);
            overflow-y: scroll;
            scroll-behavior: smooth;
        }

        .cb-container {
            pointer-events: none;
            width: 18px;
            height: 18px;
            position: relative;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 18px;
            width: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        .row-selected .checkmark {
            background: #3b82f6;
            border-color: #60a5fa;
        }

        .row-selected .checkmark:after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            font-size: 10px;
            color: white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .badge-p {
            font-size: 8px;
            background: #fbbf24;
            color: #000;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 8px;
            font-weight: bold;
        }

        .badge-dedup {
            font-size: 8px;
            background: #10b981;
            color: #fff;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 8px;
            font-weight: bold;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }

        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 300;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        .notification.success {
            background: #10b981;
            color: white;
        }

        .notification.error {
            background: #ef4444;
            color: white;
        }

        .notification.info {
            background: #3b82f6;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Upload Progress Panel */
        .upload-panel {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .upload-panel-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .upload-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            min-height: 0;
        }

        .upload-item {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .upload-item:last-child {
            margin-bottom: 0;
        }

        .upload-item-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            color: #e2e8f0;
            font-weight: 500;
        }

        .upload-progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .upload-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .upload-progress-fill.complete {
            background: linear-gradient(90deg, #10b981 0%, #34d399 100%);
        }

        .upload-progress-fill.failed {
            background: linear-gradient(90deg, #ef4444 0%, #f87171 100%);
        }

        .upload-progress-fill.retrying {
            background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .upload-stats {
            background: rgba(30, 41, 59, 0.6);
            padding: 8px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 10px;
            color: #94a3b8;
        }

        .overall-progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 8px 12px;
            overflow: hidden;
        }

        .overall-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 50%, #10b981 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .status-icon {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            flex-shrink: 0;
        }

        .status-icon.uploading {
            color: #3b82f6;
        }

        .status-icon.complete {
            color: #10b981;
        }

        .status-icon.failed {
            color: #ef4444;
        }

        .status-icon.pending {
            color: #64748b;
        }

        .status-icon.retrying {
            color: #f59e0b;
        }
    </style>
</head>

<body class="flex flex-col md:flex-row">

    <!-- Auth Page -->
    <div id="authPage"
        class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6 text-white text-center">
        <div class="max-w-md w-full glass p-10 rounded-3xl space-y-4 border border-white/10 shadow-2xl">
            <h1 class="text-3xl font-black text-blue-500 italic tracking-tighter">LUNARIFT_FILES</h1>
            <p class="text-xs text-slate-400">Secure Cloud Storage</p>

            <div id="authError" class="hidden bg-red-500/20 border border-red-500 text-red-200 p-3 rounded-lg text-sm">
            </div>

            <input type="text" id="uIn" placeholder="Username"
                class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl outline-none focus:border-blue-500">
            <input type="password" id="pIn" placeholder="Password"
                class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl outline-none focus:border-blue-500">

            <button id="authBtn" onclick="handleAuth()"
                class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition flex items-center justify-center gap-2">
                <span id="authBtnText">Sign In</span>
                <div id="authSpinner" class="spinner hidden"></div>
            </button>

            <p onclick="toggleAuthMode()" class="text-xs text-slate-500 cursor-pointer hover:text-white">
                <span id="authToggleText">Need an account? Register</span>
            </p>

            <div class="text-xs text-slate-600 mt-4">
                <p>Password must be 8+ characters with uppercase, lowercase, and number</p>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar"
        class="hidden w-full md:w-72 glass border-r border-slate-800 flex flex-col p-4 h-screen flex-shrink-0 z-20 overflow-hidden">
        <h1 class="text-lg font-bold text-blue-400 mb-1 italic">Lunarift Files</h1>
        <p id="usrD" class="text-[9px] text-slate-500 font-mono mb-4 italic"></p>

        <!-- Upload Progress Panel -->
        <div id="uploadPanel" class="upload-panel hidden mb-4">
            <div class="upload-panel-header">
                <div class="flex items-center gap-2">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span id="uploadPanelTitle" class="font-bold text-sm">Uploading...</span>
                </div>
                <button onclick="cancelAllUploads()" id="cancelUploadBtn"
                    class="text-white/70 hover:text-white text-xs px-2 py-1 bg-white/10 rounded hover:bg-white/20 transition">
                    <i class="fas fa-times"></i> Cancel
                </button>
            </div>

            <div class="overall-progress-bar">
                <div id="overallProgressFill" class="overall-progress-fill" style="width: 0%"></div>
            </div>

            <div id="uploadList" class="upload-list"></div>

            <div class="upload-stats flex-shrink-0">
                <div class="flex justify-between items-center">
                    <span id="uploadStatsText">0 / 0 files</span>
                    <span id="uploadSpeedText">-- MB/s</span>
                </div>
            </div>
        </div>


        <div class="pt-4 border-t border-slate-800 space-y-2 text-xs text-white">
            <button onclick="newFolder()"
                class="w-full bg-slate-800 py-2 rounded font-bold transition hover:bg-slate-700">New Folder</button>

            <div class="relative group">
                <button onclick="uploadMenu.classList.toggle('hidden')" id="uploadBtn"
                    class="w-full bg-blue-600 py-2 rounded font-bold hover:bg-blue-500 transition">Upload...</button>
                <div id="uploadMenu"
                    class="absolute bottom-full left-0 w-full glass rounded-lg mb-1 hidden border border-slate-700 overflow-hidden shadow-2xl">
                    <button onclick="document.getElementById('fileIn').click(); uploadMenu.classList.add('hidden')"
                        class="w-full p-3 hover:bg-blue-600/20 text-left border-b border-slate-700">Files</button>
                    <button onclick="document.getElementById('folderIn').click(); uploadMenu.classList.add('hidden')"
                        class="w-full p-3 hover:bg-blue-600/20 text-left">Folder</button>
                </div>
            </div>

            <button onclick="nukeDrive()"
                class="w-full bg-red-900/10 text-red-500 py-2 rounded mt-2 hover:bg-red-900/40">Nuke Storage</button>
            <button onclick="checkLatency()"
                class="w-full bg-slate-800 text-slate-400 py-2 rounded mt-2 hover:text-white">Check Latency</button>
            <button onclick="logout()"
                class="w-full bg-slate-900 text-slate-500 py-2 rounded mt-2 transition">Logout</button>

            <input type="file" id="fileIn" multiple class="hidden" onchange="startUpload(this.files)">
            <input type="file" id="folderIn" webkitdirectory directory class="hidden"
                onchange="startUpload(this.files)">
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="mainView" class="hidden flex-grow flex flex-col min-w-0 bg-[#020617] h-screen overflow-hidden">
        <header class="p-3 border-b border-slate-800 flex items-center justify-between flex-shrink-0 z-10 glass">
            <div class="flex items-center gap-4 font-mono text-sm">
                <button onclick="goBack()" id="backBtn" class="text-slate-400 hover:text-white p-2 rounded-lg">
                    <i class="fas fa-chevron-left text-lg"></i>
                </button>
                <span id="pathDisplay" class="text-blue-400">/root</span>
            </div>

            <div id="selBar"
                class="hidden bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-bold flex gap-6 shadow-lg shadow-blue-900/20">
                <span id="selCount">0 selected</span>
                <button onclick="bulkDownload()"><i class="fas fa-download"></i></button>
                <button onclick="bulkMove()"><i class="fas fa-arrows-alt"></i></button>
                <button onclick="bulkDelete()" class="text-red-200"><i class="fas fa-trash"></i></button>
            </div>

            <button onclick="loadFiles()" class="text-slate-400 hover:text-white px-2">
                <i class="fas fa-sync-alt"></i>
            </button>
        </header>

        <div id="mainScroll">
            <table class="w-full border-collapse text-left">
                <thead class="sticky top-0 bg-[#020617] text-slate-500 uppercase text-[10px] z-10 shadow-md">
                    <tr>
                        <th style="width:50px" class="pl-5 py-3 border-b border-slate-800">
                            <div class="cb-container" style="pointer-events:auto" onclick="toggleAllCheck()">
                                <div class="checkmark"></div>
                            </div>
                        </th>
                        <th class="p-3 border-b border-slate-800 cursor-pointer" onclick="setSort('name')">Name</th>
                        <th class="p-3 border-b border-slate-800 cursor-pointer" onclick="setSort('addedAt')">Date Added
                        </th>
                        <th class="p-3 border-b border-slate-800 cursor-pointer" onclick="setSort('size')">Size</th>
                        <th class="p-3 border-b border-slate-800 text-right pr-10">Action</th>
                    </tr>
                </thead>
                <tbody id="listBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold text-white mb-4" id="confirmTitle">Confirm Action</h3>
            <p class="text-slate-300 mb-6" id="confirmMessage">Are you sure?</p>
            <div class="flex gap-3">
                <button onclick="confirmModal.classList.remove('active')"
                    class="flex-1 bg-slate-700 text-white py-2 rounded-lg hover:bg-slate-600">Cancel</button>
                <button id="confirmBtn"
                    class="flex-1 bg-red-600 text-white py-2 rounded-lg hover:bg-red-500">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Prompt Modal -->
    <div id="promptModal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold text-white mb-4" id="promptTitle">Input Required</h3>
            <input type="text" id="promptInput"
                class="w-full bg-slate-900 border border-slate-700 p-3 rounded-lg outline-none focus:border-blue-500 mb-6">
            <div class="flex gap-3">
                <button onclick="promptModal.classList.remove('active'); promptResolve(null)"
                    class="flex-1 bg-slate-700 text-white py-2 rounded-lg hover:bg-slate-600">Cancel</button>
                <button onclick="promptModal.classList.remove('active'); promptResolve(promptInput.value)"
                    class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-500">OK</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // STATE MANAGEMENT
        // ============================================================================

        let isReg = false;
        let allFiles = [], allFolders = [], currentPath = '/';
        let sortCol = 'name', sortOrder = 1;
        let token = localStorage.getItem('fs_token');
        let user = localStorage.getItem('fs_user');
        let selFiles = new Set(), selFolders = new Set();
        let promptResolve = null;

        // ============================================================================
        // UTILITY FUNCTIONS
        // ============================================================================

        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        function showConfirm(title, message) {
            return new Promise(resolve => {
                confirmTitle.textContent = title;
                confirmMessage.textContent = message;
                confirmModal.classList.add('active');

                confirmBtn.onclick = () => {
                    confirmModal.classList.remove('active');
                    resolve(true);
                };

                confirmModal.onclick = (e) => {
                    if (e.target === confirmModal) {
                        confirmModal.classList.remove('active');
                        resolve(false);
                    }
                };
            });
        }

        function showPrompt(title, defaultValue = '') {
            return new Promise(resolve => {
                promptTitle.textContent = title;
                promptInput.value = defaultValue;
                promptModal.classList.add('active');
                promptResolve = resolve;
                promptInput.focus();

                promptModal.onclick = (e) => {
                    if (e.target === promptModal) {
                        promptModal.classList.remove('active');
                        resolve(null);
                    }
                };
            });
        }

        async function apiFetch(url, opts = {}) {
            opts.headers = opts.headers || {};

            if (token) {
                opts.headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const res = await fetch(url, opts);

                if (res.status === 401) {
                    showNotification('Session expired. Please login again.', 'error');
                    logout();
                    return null;
                }

                if (!res.ok) {
                    const error = await res.json().catch(() => ({ error: 'Request failed' }));
                    throw new Error(error.error || 'Request failed');
                }

                return res;
            } catch (error) {
                showNotification(error.message, 'error');
                throw error;
            }
        }

        // ============================================================================
        // AUTHENTICATION
        // ============================================================================

        function toggleAuthMode() {
            isReg = !isReg;
            authBtnText.textContent = isReg ? 'Register' : 'Sign In';
            authToggleText.textContent = isReg ? 'Already have an account? Sign In' : 'Need an account? Register';
            authError.classList.add('hidden');
        }

        async function handleAuth() {
            console.log('handleAuth called, isReg:', isReg);
            const username = uIn.value.trim();
            const password = pIn.value;

            console.log('Username:', username, 'Password length:', password.length);

            if (!username || !password) {
                authError.textContent = 'Please enter username and password';
                authError.classList.remove('hidden');
                return;
            }

            authBtn.disabled = true;
            authSpinner.classList.remove('hidden');
            authError.classList.add('hidden');

            try {
                const endpoint = isReg ? '/api/register' : '/api/login';
                console.log('Sending request to:', endpoint);

                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                console.log('Response status:', res.status);
                const data = await res.json();
                console.log('Response data:', data);

                if (!res.ok) {
                    authError.textContent = data.error || 'Authentication failed';
                    authError.classList.remove('hidden');
                    return;
                }

                if (isReg) {
                    showNotification('Registration successful! Please sign in.', 'success');
                    toggleAuthMode();
                    pIn.value = '';
                } else {
                    localStorage.setItem('fs_token', data.token);
                    localStorage.setItem('fs_user', data.username);
                    token = data.token;
                    user = data.username;
                    location.reload();
                }
            } catch (error) {
                console.error('Auth error:', error);
                authError.textContent = error.message || 'Network error';
                authError.classList.remove('hidden');
            } finally {
                authBtn.disabled = false;
                authSpinner.classList.add('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('fs_token');
            localStorage.removeItem('fs_user');
            location.reload();
        }

        // ============================================================================
        // FILE OPERATIONS
        // ============================================================================

        // Configuration
        const MAX_PARALLEL_UPLOADS = 5;
        const MAX_RETRIES = 3;
        const RETRY_DELAY_BASE = 1000;

        // Upload state
        let uploadCancelled = false;
        let activeUploads = new Map(); // fileId -> { name, status, progress, size }
        let uploadStartTime = 0;
        let totalBytesUploaded = 0;

        async function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function generateFileId() {
            return `file_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatSpeed(bytesPerSecond) {
            if (bytesPerSecond === 0) return '-- MB/s';
            const mbps = bytesPerSecond / (1024 * 1024);
            return mbps.toFixed(2) + ' MB/s';
        }

        function updateUploadUI() {
            const panel = document.getElementById('uploadPanel');
            const list = document.getElementById('uploadList');
            const overallFill = document.getElementById('overallProgressFill');
            const statsText = document.getElementById('uploadStatsText');
            const speedText = document.getElementById('uploadSpeedText');
            const titleText = document.getElementById('uploadPanelTitle');

            if (activeUploads.size === 0) {
                panel.classList.add('hidden');
                return;
            }

            panel.classList.remove('hidden');

            // Calculate totals
            let completed = 0;
            let failed = 0;
            let totalSize = 0;
            let uploadedSize = 0;

            activeUploads.forEach(upload => {
                totalSize += upload.size;
                if (upload.status === 'complete' || upload.status === 'dedup') {
                    completed++;
                    uploadedSize += upload.size;
                } else if (upload.status === 'failed') {
                    failed++;
                } else if (upload.status === 'uploading') {
                    uploadedSize += upload.size * (upload.progress / 100);
                }
            });

            const total = activeUploads.size;
            const percent = total > 0 ? Math.round((completed / total) * 100) : 0;

            // Update overall progress
            overallFill.style.width = `${percent}%`;

            // Update stats
            statsText.textContent = `${completed} / ${total} files (${formatBytes(uploadedSize)} / ${formatBytes(totalSize)})`;

            // Calculate speed
            const elapsed = (Date.now() - uploadStartTime) / 1000;
            const speed = elapsed > 0 ? totalBytesUploaded / elapsed : 0;
            speedText.textContent = formatSpeed(speed);

            // Update title
            if (completed === total && failed === 0) {
                titleText.textContent = '✓ Upload Complete!';
                document.getElementById('cancelUploadBtn').style.display = 'none';
            } else if (uploadCancelled) {
                titleText.textContent = 'Cancelled';
            } else {
                titleText.textContent = `Uploading... ${percent}%`;
            }

            // Render file list (show all files in upload order)
            const uploads = Array.from(activeUploads.values());
            list.innerHTML = uploads.map((upload, index) => {
                let statusIcon, statusClass, progressClass;
                switch (upload.status) {
                    case 'pending':
                        statusIcon = '<i class="fas fa-clock"></i>';
                        statusClass = 'pending';
                        progressClass = '';
                        break;
                    case 'uploading':
                        statusIcon = '<i class="fas fa-spinner fa-spin"></i>';
                        statusClass = 'uploading';
                        progressClass = '';
                        break;
                    case 'complete':
                        statusIcon = '<i class="fas fa-check"></i>';
                        statusClass = 'complete';
                        progressClass = 'complete';
                        break;
                    case 'dedup':
                        statusIcon = '<i class="fas fa-copy"></i>';
                        statusClass = 'complete';
                        progressClass = 'complete';
                        break;
                    case 'failed':
                        statusIcon = '<i class="fas fa-times"></i>';
                        statusClass = 'failed';
                        progressClass = 'failed';
                        break;
                    case 'retrying':
                        statusIcon = '<i class="fas fa-redo"></i>';
                        statusClass = 'retrying';
                        progressClass = 'retrying';
                        break;
                    default:
                        statusIcon = '<i class="fas fa-file"></i>';
                        statusClass = 'pending';
                        progressClass = '';
                }

                return `
                    <div class="upload-item">
                        <div class="flex items-center">
                            <span class="status-icon ${statusClass}">${statusIcon}</span>
                            <span class="upload-item-name" title="${upload.name}">${upload.name}</span>
                            <span class="ml-auto text-slate-500 text-[10px]">${formatBytes(upload.size)}</span>
                        </div>
                        <div class="upload-progress-bar">
                            <div class="upload-progress-fill ${progressClass}" style="width: ${upload.progress}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function cancelAllUploads() {
            uploadCancelled = true;
            showNotification('Cancelling uploads...', 'info');
        }

        async function uploadFileWithRetry(fileId, file, targetPath, retryCount = 0) {
            if (uploadCancelled) {
                activeUploads.set(fileId, { ...activeUploads.get(fileId), status: 'failed', progress: 0 });
                updateUploadUI();
                throw new Error('Upload cancelled');
            }

            const upload = activeUploads.get(fileId);

            if (retryCount > 0) {
                activeUploads.set(fileId, { ...upload, status: 'retrying', progress: 0 });
                updateUploadUI();
            }

            const fd = new FormData();
            fd.append('file', file);
            fd.append('path', targetPath);

            try {
                // Start upload
                activeUploads.set(fileId, { ...upload, status: 'uploading', progress: 50 });
                updateUploadUI();

                const res = await apiFetch('/api/upload', { method: 'POST', body: fd });
                if (!res) throw new Error('No response from server');

                const result = await res.json();
                totalBytesUploaded += file.size;

                // Mark complete
                const finalStatus = result.deduplicated > 0 ? 'dedup' : 'complete';
                activeUploads.set(fileId, { ...activeUploads.get(fileId), status: finalStatus, progress: 100 });
                updateUploadUI();

                return result;
            } catch (error) {
                if (uploadCancelled) {
                    activeUploads.set(fileId, { ...activeUploads.get(fileId), status: 'failed', progress: 0 });
                    updateUploadUI();
                    throw error;
                }

                if (retryCount < MAX_RETRIES) {
                    const delay = RETRY_DELAY_BASE * Math.pow(2, retryCount);
                    console.warn(`[Retry] ${file.name} failed, retrying in ${delay}ms (attempt ${retryCount + 1}/${MAX_RETRIES})`);
                    await sleep(delay);
                    return uploadFileWithRetry(fileId, file, targetPath, retryCount + 1);
                }

                activeUploads.set(fileId, { ...activeUploads.get(fileId), status: 'failed', progress: 0 });
                updateUploadUI();
                throw error;
            }
        }

        async function startUpload(files) {
            if (files.length === 0) return;

            // Reset state
            uploadCancelled = false;
            activeUploads.clear();
            uploadStartTime = Date.now();
            totalBytesUploaded = 0;

            // Reset cancel button
            document.getElementById('cancelUploadBtn').style.display = 'block';

            const total = files.length;
            let completed = 0;
            let dedupCount = 0;
            let failedFiles = [];

            // Detect folder name if uploading a folder
            let folderName = null;
            if (files[0] && files[0].webkitRelativePath) {
                folderName = files[0].webkitRelativePath.split('/')[0];
            }

            // Helper function to normalize paths
            function normalizePath(inputPath) {
                if (!inputPath || typeof inputPath !== 'string') return '/';
                let normalized = inputPath.replace(/\\/g, '/').replace(/\/+/g, '/');
                if (!normalized.startsWith('/')) normalized = '/' + normalized;
                if (!normalized.endsWith('/')) normalized = normalized + '/';
                // Remove . and .. segments
                const parts = normalized.split('/').filter(p => p && p !== '.' && p !== '..');
                return '/' + parts.join('/') + (parts.length > 0 ? '/' : '');
            }

            // Prepare all files with their target paths and IDs
            const fileQueue = Array.from(files).map(f => {
                const fileId = generateFileId();

                // Calculate target path based on whether it's a folder upload or file upload
                let rawPath;
                if (f.webkitRelativePath) {
                    // Folder upload - extract directory from relative path
                    rawPath = '/' + f.webkitRelativePath.split('/').slice(0, -1).join('/') + '/';
                } else {
                    // File upload - use current path
                    rawPath = currentPath;
                }

                const targetPath = normalizePath(rawPath);

                console.log(`[Path] ${f.name}: raw="${rawPath}" -> normalized="${targetPath}"`);

                // Add to tracking with path info
                activeUploads.set(fileId, {
                    name: f.name,
                    status: 'pending',
                    progress: 0,
                    size: f.size,
                    targetPath: targetPath
                });

                return { fileId, file: f, targetPath };
            });

            updateUploadUI();

            // Process in parallel batches
            const uploadNextBatch = async () => {
                if (uploadCancelled) return;

                const batch = [];
                while (batch.length < MAX_PARALLEL_UPLOADS && fileQueue.length > 0) {
                    batch.push(fileQueue.shift());
                }

                if (batch.length === 0) return;

                const batchPromises = batch.map(async ({ fileId, file, targetPath }) => {
                    try {
                        const result = await uploadFileWithRetry(fileId, file, targetPath);
                        completed++;

                        if (result.deduplicated > 0) {
                            dedupCount += result.deduplicated;
                        }

                        return { success: true, name: file.name };
                    } catch (error) {
                        console.error(`[Failed] ${file.name}:`, error);
                        failedFiles.push(file.name);
                        return { success: false, name: file.name, error };
                    }
                });

                await Promise.all(batchPromises);

                // Process next batch
                if (fileQueue.length > 0 && !uploadCancelled) {
                    await uploadNextBatch();
                }
            };

            await uploadNextBatch();

            const duration = ((Date.now() - uploadStartTime) / 1000).toFixed(1);

            if (uploadCancelled) {
                showNotification(`Upload cancelled. ${completed}/${total} files completed.`, 'error');
            } else if (failedFiles.length > 0) {
                showNotification(`⚠️ Upload complete with ${failedFiles.length} failures (${duration}s)`, 'error');
                console.error('Failed files:', failedFiles);
            } else if (dedupCount > 0) {
                showNotification(`✓ Upload complete! ${completed} files in ${duration}s (${dedupCount} deduplicated)`, 'success');
            } else {
                const speedMsg = formatSpeed(totalBytesUploaded / parseFloat(duration));
                showNotification(`✓ All ${total} files uploaded in ${duration}s (${speedMsg})`, 'success');
            }

            // Keep panel visible for a moment then hide
            setTimeout(() => {
                if (!uploadCancelled && failedFiles.length === 0) {
                    activeUploads.clear();
                    updateUploadUI();
                }
            }, 3000);

            loadFiles();
        }

        async function loadFiles() {
            if (!token) return;

            authPage.classList.add('hidden');
            sidebar.classList.remove('hidden');
            mainView.classList.remove('hidden');
            mainView.classList.add('flex');

            usrD.innerText = "User: " + user;

            try {
                const res = await apiFetch('/api/sync');
                if (!res) return;

                const data = await res.json();
                allFiles = data.files;
                allFolders = data.folders;

                render();
            } catch (error) {
                console.error('Load files failed:', error);
            }
        }

        async function newFolder() {
            const name = await showPrompt('Enter folder name:');
            if (!name) return;

            const sanitized = name.replace(/[^a-zA-Z0-9_-]/g, '');
            if (!sanitized) {
                showNotification('Invalid folder name', 'error');
                return;
            }

            try {
                await apiFetch('/api/create-folder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentPath + sanitized + '/' })
                });

                showNotification('Folder created', 'success');
                loadFiles();
            } catch (error) {
                console.error('Create folder failed:', error);
            }
        }

        async function checkLatency() {
            showNotification('Checking network latency...', 'info');
            const start = Date.now();
            try {
                const res = await apiFetch('/api/ping');
                if (res) {
                    const data = await res.json();
                    const rtt = Date.now() - start;
                    const msg = `Latency: ${data.latency}ms (Discord) | RTT: ${rtt}ms`;
                    console.log('[Debug]', msg);
                    showNotification(msg, 'success');
                }
            } catch (error) {
                console.error('Latency check failed:', error);
                showNotification('Latency check failed', 'error');
            }
        }

        async function nukeDrive() {
            const confirmed = await showConfirm(
                'Nuke Storage',
                'This will permanently delete ALL your files. This cannot be undone!'
            );

            if (!confirmed) return;

            const pass = await showPrompt('Enter nuke password:');
            if (!pass) return;

            try {
                await apiFetch('/api/nuke', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pass })
                });

                showNotification('Storage wiped', 'success');
                setTimeout(() => location.reload(), 2000);
            } catch (error) {
                console.error('Nuke failed:', error);
            }
        }

        async function deleteItem(id, isFolder) {
            const confirmed = await showConfirm(
                'Delete Item',
                `Are you sure you want to delete this ${isFolder ? 'folder and all its contents' : 'file'}?`
            );

            if (!confirmed) return;

            try {
                await apiFetch('/api/item', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, isFolder })
                });

                showNotification('Deleted successfully', 'success');
                loadFiles();
            } catch (error) {
                console.error('Delete failed:', error);
            }
        }

        async function bulkDelete() {
            const count = selFiles.size + selFolders.size;
            const confirmed = await showConfirm(
                'Delete Items',
                `Delete ${count} selected item${count !== 1 ? 's' : ''}?`
            );

            if (!confirmed) return;

            try {
                for (let id of selFiles) {
                    await apiFetch('/api/item', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, isFolder: false })
                    });
                }

                for (let path of selFolders) {
                    await apiFetch('/api/item', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: path, isFolder: true })
                    });
                }

                selFiles.clear();
                selFolders.clear();
                showNotification('Items deleted', 'success');
                loadFiles();
            } catch (error) {
                console.error('Bulk delete failed:', error);
            }
        }

        async function bulkMove() {
            const dest = await showPrompt('Move to path:', '/');
            if (!dest) return;

            const final = dest.endsWith('/') ? dest : dest + '/';

            try {
                for (let id of selFiles) {
                    await apiFetch('/api/move-item', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, isFolder: false, newPath: final })
                    });
                }

                for (let p of selFolders) {
                    const folderName = p.split('/').filter(x => x).pop();
                    await apiFetch('/api/move-item', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: p,
                            isFolder: true,
                            newPath: final + folderName + '/'
                        })
                    });
                }

                selFiles.clear();
                selFolders.clear();
                showNotification('Items moved', 'success');
                loadFiles();
            } catch (error) {
                console.error('Bulk move failed:', error);
            }
        }

        function bulkDownload() {
            selFiles.forEach(id => {
                const a = document.createElement('a');
                a.href = `/download/${id}?token=${encodeURIComponent(token)}`;
                a.click();
            });
        }

        // ============================================================================
        // UI RENDERING
        // ============================================================================

        function toggleCheck(id, isF, e) {
            e.stopPropagation();

            if (isF) {
                selFolders.has(id) ? selFolders.delete(id) : selFolders.add(id);
            } else {
                selFiles.has(id) ? selFiles.delete(id) : selFiles.add(id);
            }

            updateSelectionBar();
            render();
        }

        function toggleAllCheck() {
            const fs = allFiles.filter(f => f.path === currentPath);
            const sub = getFolders();
            const allSelected = fs.every(f => selFiles.has(f.id)) && sub.every(n => selFolders.has(currentPath + n + '/'));

            if (allSelected) {
                fs.forEach(f => selFiles.delete(f.id));
                sub.forEach(n => selFolders.delete(currentPath + n + '/'));
            } else {
                fs.forEach(f => selFiles.add(f.id));
                sub.forEach(n => selFolders.add(currentPath + n + '/'));
            }

            updateSelectionBar();
            render();
        }

        function updateSelectionBar() {
            const count = selFiles.size + selFolders.size;
            selBar.classList.toggle('hidden', count === 0);
            selCount.innerText = `${count} item${count !== 1 ? 's' : ''}`;
        }

        function setSort(col) {
            if (sortCol === col) {
                sortOrder *= -1;
            } else {
                sortCol = col;
                sortOrder = 1;
            }
            render();
        }

        function goBack() {
            let p = currentPath.split('/').filter(x => x);
            p.pop();
            currentPath = '/' + p.join('/') + (p.length > 0 ? '/' : '');
            render();
        }

        function getFolders() {
            const s = new Set(
                allFolders
                    .filter(p => p.startsWith(currentPath) && p !== currentPath)
                    .map(p => p.replace(currentPath, '').split('/')[0])
            );

            allFiles
                .filter(f => f.path.startsWith(currentPath) && f.path !== currentPath)
                .forEach(f => s.add(f.path.replace(currentPath, '').split('/')[0]));

            return Array.from(s);
        }

        function render() {
            pathDisplay.innerText = currentPath;
            backBtn.style.display = currentPath === '/' ? 'none' : 'block';
            listBody.innerHTML = '';

            // Render folders
            getFolders().sort().forEach(n => {
                const full = currentPath + n + '/';
                const isS = selFolders.has(full);
                const isP = allFiles.some(f => f.path.startsWith(full) && f.status === "PENDING");

                const tr = document.createElement('tr');
                tr.className = "row-item border-b border-slate-800/50 cursor-pointer " + (isS ? "row-selected" : "");
                tr.innerHTML = `
                    <td class="pl-5 py-3" onclick="toggleCheck('${full}', true, event)">
                        <div class="cb-container"><div class="checkmark"></div></div>
                    </td>
                    <td class="p-3 text-sm font-semibold text-white">
                        <i class="fas fa-folder text-yellow-500 mr-2"></i> ${n}
                        ${isP ? '<span class="badge-p">SYNCING</span>' : ''}
                    </td>
                    <td class="p-3 text-xs text-slate-500">--</td>
                    <td class="p-3 text-xs text-slate-500">Folder</td>
                    <td class="p-3 text-right pr-10">
                        <button onclick="event.stopPropagation(); deleteItem('${full}', true)" class="text-red-500 hover:text-white transition">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;

                // Single click on row opens folder
                tr.onclick = (e) => {
                    // Ignore if clicked on checkbox or action buttons
                    if (e.target.closest('td:first-child') || e.target.closest('button') || e.target.closest('a')) return;

                    currentPath = full;
                    selFiles.clear();
                    selFolders.clear();
                    updateSelectionBar();
                    render();
                };

                listBody.appendChild(tr);
            });

            // Render files
            const fsList = allFiles.filter(f => f.path === currentPath);
            fsList.sort((a, b) => (a[sortCol] > b[sortCol] ? 1 : -1) * sortOrder);

            fsList.forEach(f => {
                const isS = selFiles.has(f.id);
                const isP = f.status === "PENDING";
                const isDedup = f.isReference;

                const tr = document.createElement('tr');
                tr.className = "row-item border-b border-slate-800/50 group " + (isS ? "row-selected " : "") + (isP ? "opacity-40" : "");

                tr.innerHTML = `
                    <td class="pl-5 py-3" onclick="toggleCheck('${f.id}', false, event)">
                        <div class="cb-container"><div class="checkmark"></div></div>
                    </td>
                    <td class="p-3 text-sm text-slate-300 font-medium truncate">
                        <i class="fas fa-file-alt text-blue-500 mr-2"></i> ${f.name}
                        ${isP ? '<span class="badge-p">UPLOAD...</span>' : ''}
                        ${isDedup ? '<span class="badge-dedup">DEDUP</span>' : ''}
                    </td>
                    <td class="p-3 text-[10px] text-slate-500 font-mono">
                        ${new Date(f.addedAt).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })}
                    </td>
                    <td class="p-3 text-xs text-slate-500">${(f.size / 1024 / 1024).toFixed(2)} MB</td>
                    <td class="p-3 text-right space-x-4 pr-10">
                        ${!isP ? `<a onclick="event.stopPropagation()" href="/download/${f.id}?token=${encodeURIComponent(token)}" class="text-blue-400 hover:text-white"><i class="fas fa-download"></i></a>` : ''}
                        <button onclick="event.stopPropagation(); deleteItem('${f.id}', false)" class="text-red-500 hover:text-white transition">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;

                // No row click action for files

                listBody.appendChild(tr);
            });
        }

        // ============================================================================
        // KEYBOARD SHORTCUTS
        // ============================================================================

        document.addEventListener('keydown', (e) => {
            if (authPage.classList.contains('hidden')) {
                if (e.ctrlKey && e.key === 'a') {
                    e.preventDefault();
                    toggleAllCheck();
                } else if (e.key === 'Delete') {
                    if (selFiles.size > 0 || selFolders.size > 0) {
                        bulkDelete();
                    }
                }
            }
        });

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        if (token) {
            loadFiles();
            setInterval(() => {
                loadFiles();
            }, 5000); // Poll every 5 seconds
        }
    </script>
</body>

</html>
